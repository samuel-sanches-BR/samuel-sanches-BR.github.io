---
layout: null
---
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservoir Computing (ESN)</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #2ecc71; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; color: #333; background-color: var(--bg); }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { margin-top: 0; color: var(--primary); }
        
        #setup-section { margin: 20px 0; }
        #progress-container { width: 100%; background: #eee; border-radius: 10px; height: 10px; overflow: hidden; margin-bottom: 8px; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.3s ease; }
        #status-text { font-size: 0.85em; color: #7f8c8d; text-align: center; }

        /* Painel de Controles */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .slider-group { display: flex; flex-direction: column; }
        .slider-group label { font-weight: 600; font-size: 0.9em; margin-bottom: 5px; color: #34495e; }
        .val-display { color: var(--secondary); font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; }

        .btn-main { grid-column: 1 / -1; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        .btn-main:hover { background: #1a252f; }
        .btn-main:disabled { background: #95a5a6; cursor: not-allowed; }

        #plot-container { margin-top: 20px; text-align: center; }
        #plot-container img { max-width: 100%; height: auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #resultado-box { text-align: center; font-weight: bold; margin-top: 15px; display: none; padding: 10px; border-radius: 8px; }
        .success { background: #e8f8f5; color: #27ae60; }
        .error { background: #fdedec; color: #e74c3c; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Reservoir Computing (ESN)</h1>
        <p>Previsão autorregressiva de séries temporais usando a equação de atualização da rede.</p>

        <div id="setup-section">
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div id="status-text">Baixando bibliotecas de IA (isso pode levar uns 15 segundos)...</div>
        </div>

        <div id="controles" style="display:none;" class="animate-in">
            <div class="controls-grid">
                <div class="slider-group">
                    <label>Neurônios ($N$): <span id="val-n" class="val-display">200</span></label>
                    <input type="range" id="input-n" min="50" max="800" step="50" value="200" oninput="document.getElementById('val-n').innerText = this.value">
                </div>
                <div class="slider-group">
                    <label>Passos Futuros (N_FUTURE): <span id="val-future" class="val-display">80</span></label>
                    <input type="range" id="n_future" min="10" max="250" step="10" value="80" oninput="document.getElementById('val-future').innerText = this.value">
                </div>
                <div class="slider-group">
                    <label>Raio Espectral: <span id="val-sr" class="val-display">0.9</span></label>
                    <input type="range" id="input-sr" min="0.1" max="1.5" step="0.1" value="0.9" oninput="document.getElementById('val-sr').innerText = this.value">
                </div>
                <div class="slider-group">
                    <label>Taxa de Vazamento ($\alpha$): <span id="val-alpha" class="val-display">0.3</span></label>
                    <input type="range" id="input-alpha" min="0.1" max="1.0" step="0.1" value="0.3" oninput="document.getElementById('val-alpha').innerText = this.value">
                </div>
                
                <button id="btn-calcular" class="btn-main">Treinar Rede e Prever Futuro</button>
            </div>
            
            <div id="resultado-box"></div>
            <div id="plot-container"></div>
        </div>
    </div>

    <script type="text/javascript">
        let pyodide;

        async function updateProgress(pct, msg) {
            document.getElementById("progress-bar").style.width = pct + "%";
            document.getElementById("status-text").innerText = msg;
            await new Promise(r => setTimeout(r, 100));
        }

        async function init() {
            try {
                await updateProgress(15, "Iniciando Python...");
                pyodide = await loadPyodide();
                
                await updateProgress(40, "Carregando NumPy e Matplotlib...");
                await pyodide.loadPackage(["numpy", "matplotlib"]);
                
                await updateProgress(65, "Carregando Scikit-Learn (Pesado!)...");
                await pyodide.loadPackage(["scikit-learn"]);
                
                await updateProgress(85, "Sincronizando modelo de IA...");
                const res = await fetch("./processamento.py");
                if (!res.ok) throw new Error("processamento.py não encontrado!");
                pyodide.runPython(await res.text());
                
                await updateProgress(100, "IA Pronta para uso!");
                setTimeout(() => {
                    document.getElementById("setup-section").style.display = "none";
                    document.getElementById("controles").style.display = "block";
                }, 500);

                document.getElementById("btn-calcular").onclick = executar;
            } catch (e) { document.getElementById("status-text").innerHTML = `<b style="color:red">Erro: ${e.message}</b>`; }
        }

        async function executar() {
            const btn = document.getElementById("btn-calcular");
            const resBox = document.getElementById("resultado-box");
            const plotDiv = document.getElementById("plot-container");

            const N = document.getElementById("input-n").value;
            const sr = document.getElementById("input-sr").value;
            const alpha = document.getElementById("input-alpha").value;
            const n_future = document.getElementById("n_future").value;

            btn.disabled = true;
            btn.innerText = "Treinando modelo... Aguarde";
            resBox.style.display = "none";
            plotDiv.classList.remove("animate-in");

            // Pequena pausa para a UI atualizar o botão antes do Python travar a thread
            await new Promise(r => setTimeout(r, 50));

            try {
                const resultado = pyodide.runPython(`run_esn_app("${n_res}", "${spec_rad}", "${leak_rate}", "${n_future}")`)`).toString();
                const [msg, imgData] = resultado.split('|');

                resBox.innerText = msg;
                resBox.className = msg.includes("Erro") ? "error" : "success";
                resBox.style.display = "block";

                if (imgData && imgData.length > 50) {
                    plotDiv.innerHTML = `<img src="${imgData}">`;
                    plotDiv.classList.add("animate-in");
                }
            } catch (err) {
                resBox.innerText = "Erro fatal: " + err.message;
                resBox.className = "error";
                resBox.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "Treinar Rede e Prever Futuro";
            }
        }

        init();
    </script>
</body>
</html>
