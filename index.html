---
layout: null
---
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; color: #333; }
        .card { background: #f9f9f9; border: 1px solid #ddd; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .status { font-style: italic; color: #7f8c8d; margin-bottom: 20px; }
        input { padding: 10px; border: 2px solid #3498db; border-radius: 5px; width: 100px; font-size: 16px; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #resultado-box { margin-top: 20px; font-size: 1.2em; font-weight: bold; color: #27ae60; }
        #plot-container { margin-top: 30px; text-align: center; }
        #plot-container img { max-width: 100%; height: auto; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>

    <div class="card">
        <div id="status-py" class="status">⏳ Inicializando Python (WebAssembly)...</div>
        
        <div id="controles" style="display:none;">
            <label for="numero">Digite um número para a raiz:</label>
            <input type="number" id="numero" value="144">
            <button id="btn-calcular">Calcular com Python</button>
            
            <div id="resultado-box"></div>
        </div>
    </div>

    <div id="plot-container"></div>

    <script type="text/javascript">
        let pyodide;
    
        async function init() {
            pyodide = await loadPyodide();
            await pyodide.loadPackage(["matplotlib", "numpy"]);
            
            const response = await fetch("./processamento.py");
            const pythonCode = await response.text();
            
            
            pyodide.runPython(pythonCode);
            
    
            document.getElementById("status-py").innerHTML = "✅ Python carregado do arquivo externo!";
            document.getElementById("controles").style.display = "block";
            document.getElementById("btn-calcular").onclick = executarPythonExterno;
        }
    
        async function executarPythonExterno() {
            const valor = document.getElementById("numero").value;
            
            
            const funcPython = pyodide.globals.get('calcular_e_plotar');
            const resultado = funcPython(valor);
    
            const [texto, imgBase64] = resultado.split('|');
            
            document.getElementById("resultado-box").innerText = texto;
            const container = document.getElementById("plot-container");
            if(imgBase64.trim() !== "") {
                container.innerHTML = `<img src="${imgBase64}" alt="Gráfico">`;
            }
        }
    
        init();
    </script>
</body>
</html>
