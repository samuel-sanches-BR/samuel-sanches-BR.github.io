---
layout: null
---
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classical Reservoir Computing</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #2ecc71; --bg: #f4f7f6; }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; color: #333; background-color: var(--bg); }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 1px solid #eee; }
        h1 { color: var(--primary); margin-top: 0; font-size: 1.8em; }
        
        /* Barra de Progresso */
        #setup-section { margin: 20px 0; }
        #progress-container { width: 100%; background: #e0e0e0; border-radius: 10px; height: 10px; overflow: hidden; margin-bottom: 8px; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.3s ease; }
        #status-text { font-size: 0.85em; color: #7f8c8d; text-align: center; }

        /* Controles Deslizantes (Sliders) */
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; background: #f8f9fa; padding: 20px; border-radius: 10px;}
        .slider-group { display: flex; flex-direction: column; }
        .slider-group label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #34495e; }
        .slider-value { color: var(--secondary); font-weight: bold; }
        input[type=range] { width: 100%; margin-top: 8px; }

        .btn-main { grid-column: span 2; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        .btn-main:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-main:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }

        /* Mensagens e Imagem */
        #resultado-box { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: 500; text-align: center; font-size: 1.2em;}
        .success { background: #e8f8f5; color: #27ae60; border: 1px solid #27ae60; }
        .error { background: #fdedec; color: #e74c3c; border: 1px solid #e74c3c; }
        
        #plot-container { margin-top: 20px; text-align: center; min-height: 200px; }
        #plot-container img { max-width: 100%; height: auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fadeIn 0.8s ease-out forwards; }
        
        @media (max-width: 600px) { .control-panel { grid-template-columns: 1fr; } .btn-main { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h1>Previsão com Reservoir Computing (ESN)</h1>
        <p>Ajuste os hiperparâmetros abaixo para treinar a rede neural e prever a série temporal caótica de Mackey-Glass.</p>

        <div id="setup-section">
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div id="status-text">Carregando Inteligência Artificial...</div>
        </div>

        <div id="controles" style="display:none;" class="animate-in">
            <div class="control-panel">
                <div class="slider-group">
                    <label>Neurônios do Reservatório: <span id="val-neurons" class="slider-value">200</span></label>
                    <input type="range" id="n_reservoir" min="50" max="1000" step="50" value="200" oninput="updateVal('val-neurons', this.value)">
                </div>

                <div class="slider-group">
                    <label>Raio Espectral (Caos): <span id="val-sr" class="slider-value">0.95</span></label>
                    <input type="range" id="spectral_radius" min="0.1" max="1.5" step="0.05" value="0.95" oninput="updateVal('val-sr', this.value)">
                </div>

                <div class="slider-group">
                    <label>Taxa de Vazamento (Leaking): <span id="val-leak" class="slider-value">0.3</span></label>
                    <input type="range" id="leaking_rate" min="0.1" max="1.0" step="0.1" value="0.3" oninput="updateVal('val-leak', this.value)">
                </div>

                <button id="btn-calcular" class="btn-main">Treinar Modelo e Prever</button>
            </div>
            
            <div id="resultado-box"></div>
            <div id="plot-container"></div>
        </div>
    </div>

    <script type="text/javascript">
        let pyodide;

        function updateVal(id, val) {
            document.getElementById(id).innerText = val;
        }

        async function updateProgress(pct, msg) {
            document.getElementById("progress-bar").style.width = pct + "%";
            document.getElementById("status-text").innerText = msg;
            await new Promise(r => setTimeout(r, 100));
        }

        async function init() {
            try {
                await updateProgress(10, "Iniciando Wasm...");
                pyodide = await loadPyodide();
                
                await updateProgress(30, "Baixando NumPy e Matplotlib...");
                await pyodide.loadPackage(["numpy", "matplotlib"]);
                
                await updateProgress(60, "Baixando Scikit-Learn (Demorado, ~20MB)...");
                await pyodide.loadPackage(["scikit-learn"]);
                
                await updateProgress(90, "Lendo script do modelo (processamento.py)...");
                const res = await fetch("./processamento.py");
                if (!res.ok) throw new Error("Arquivo processamento.py não encontrado.");
                pyodide.runPython(await res.text());
                
                await updateProgress(100, "IA Pronta!");
                
                setTimeout(() => {
                    document.getElementById("setup-section").style.display = "none";
                    document.getElementById("controles").style.display = "block";
                }, 500);

                document.getElementById("btn-calcular").onclick = executarModelo;
            } catch (e) { 
                document.getElementById("status-text").innerHTML = `<span style="color:red">Erro: ${e.message}</span>`;
            }
        }

        async function executarModelo() {
            const n_res = document.getElementById("n_reservoir").value;
            const spec_rad = document.getElementById("spectral_radius").value;
            const leak_rate = document.getElementById("leaking_rate").value;
            
            const btnCalc = document.getElementById("btn-calcular");
            const resBox = document.getElementById("resultado-box");
            const plotDiv = document.getElementById("plot-container");

            // UI de carregamento
            resBox.style.display = "none";
            plotDiv.innerHTML = "<br>⏳ <i>Treinando a rede neural... Isso pode levar alguns segundos dependendo do número de neurônios.</i>";
            btnCalc.disabled = true;
            btnCalc.innerText = "Processando no Python...";

            // Pausa minúscula para o navegador renderizar a mensagem de 'Treinando'
            await new Promise(r => setTimeout(r, 50)); 

            try {
                // Chama a função Python passando os hiperparâmetros
                const func = pyodide.globals.get('run_esn_app');
                const resultado = func(n_res, spec_rad, leak_rate);
                
                const [msg, imgData] = resultado.split('|');

                resBox.innerText = msg;
                resBox.className = msg.includes("Erro") ? "error animate-in" : "success animate-in";
                resBox.style.display = "block";

                if (imgData && imgData.length > 50) {
                    plotDiv.innerHTML = `<img src="${imgData}" class="animate-in">`;
                } else {
                    plotDiv.innerHTML = "";
                }
            } catch (err) { 
                resBox.innerText = "Erro fatal: " + err.message; 
                resBox.className = "error animate-in";
                resBox.style.display = "block"; 
                plotDiv.innerHTML = "";
            } finally {
                btnCalc.disabled = false;
                btnCalc.innerText = "Treinar Modelo e Prever";
            }
        }

        init(); 
    </script>
</body>
</html>
