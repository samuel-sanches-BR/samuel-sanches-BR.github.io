<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; color: #333; background-color: var(--bg); }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 1px solid #eee; }
        
        /* Animação de Surgimento */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeInUp 0.6s ease-out forwards; }

        /* Barra de Progresso */
        #setup-section { margin: 20px 0; }
        #progress-container { width: 100%; background: #e0e0e0; border-radius: 10px; height: 10px; overflow: hidden; margin-bottom: 8px; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.3s ease; }
        #status-text { font-size: 0.85em; color: #7f8c8d; text-align: center; }

        /* Controles */
        .input-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        input { flex: 1; min-width: 200px; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn-main { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex-grow: 1; transition: 0.2s; }
        .btn-main:hover { background: #2980b9; transform: translateY(-1px); }
        .btn-main:active { transform: translateY(0); }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }

        #btn-download { display: none; margin-top: 15px; width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Mensagens e Imagem */
        #resultado-box { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: 500; }
        .success { background: #e8f8f5; color: #27ae60; border: 1px solid #27ae60; }
        .error { background: #fdedec; color: #e74c3c; border: 1px solid #e74c3c; }
        
        #plot-container { margin-top: 20px; text-align: center; }
        #plot-container img { max-width: 100%; height: auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="card">
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>

        <div id="setup-section">
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div id="status-text">Carregando interpretador...</div>
        </div>

        <div id="controles" style="display:none;">
            <div class="input-group">
                <input type="text" id="numero" placeholder="Digite um número (ex: 25,5)" autocomplete="off">
                <button id="btn-calcular" class="btn-main">Gerar Gráfico</button>
            </div>
            
            <div id="resultado-box"></div>
            <div id="plot-container"></div>
            <button id="btn-download">💾 Salvar Gráfico como PNG</button>
        </div>
    </div>

    <script type="text/javascript">
        let pyodide;
        let ultimaImagem = "";

        async function updateProgress(pct, msg) {
            document.getElementById("progress-bar").style.width = pct + "%";
            document.getElementById("status-text").innerText = msg;
            await new Promise(r => setTimeout(r, 100));
        }

        async function init() {
            try {
                await updateProgress(15, "Iniciando Wasm...");
                pyodide = await loadPyodide();
                await updateProgress(40, "Carregando bibliotecas Python...");
                await pyodide.loadPackage(["numpy", "matplotlib"]);
                await updateProgress(85, "Lendo processamento.py...");
                const res = await fetch("./processamento.py");
                pyodide.runPython(await res.text());
                await updateProgress(100, "Sistema Pronto!");
                
                setTimeout(() => {
                    document.getElementById("setup-section").style.display = "none";
                    document.getElementById("controles").className = "animate-in";
                    document.getElementById("controles").style.display = "block";
                }, 400);

                document.getElementById("btn-calcular").onclick = executar;
                document.getElementById("btn-download").onclick = () => {
                    const link = document.createElement('a');
                    link.href = ultimaImagem;
                    link.download = 'grafico_python.png';
                    link.click();
                };
            } catch (e) { document.getElementById("status-text").innerText = "Erro: " + e.message; }
        }

            let inputVal = document.getElementById("numero").value.replace(',', '.');
            const resBox = document.getElementById("resultado-box");
            const plotDiv = document.getElementById("plot-container");
            const btnDl = document.getElementById("btn-download");

            resBox.style.display = "none";
            plotDiv.classList.remove("animate-in"); // Reseta animação

                const resultado = pyodide.globals.get('calcular_e_plotar')(inputVal);
                const [msg, imgData] = resultado.split('|');

                resBox.className = "animate-in " + (msg.startsWith("Erro") ? "error" : "success");

                if (imgData.length > 50) {
